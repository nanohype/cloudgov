name: ci

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build ./...

      - name: test with per-package coverage floors
        # Runs the suite with coverage and enforces .coverage-floors (each package
        # has its own floor, ratcheting up as coverage lands). Produces coverage.out.
        run: bash scripts/coverage.sh

      - name: go vet
        run: go vet ./...

      - name: context-awareness check
        # Every cobra handler must thread cmd.Context() (rooted in a SIGINT/SIGTERM
        # context) instead of context.Background(), so an interrupt cancels in-flight
        # cloud calls. Fails on any context.Background() in cmd/ outside Execute().
        run: bash scripts/check-context.sh

      - name: upload coverage artifact
        if: always() # keep the profile even when a floor fails, for debugging
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # v2 binary requires action v7. v2.12.x is built with Go 1.26,
          # so it type-checks this module's go 1.26 dependencies cleanly.
          version: v2.12.2
