name: security

on:
  push:
    branches:
      - '**'
  pull_request:
  schedule:
    # Weekly Tuesday 06:00 UTC — catches newly published CVEs even when no PRs land.
    - cron: '0 6 * * 2'

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: govulncheck (known-vuln reachability)
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        # Hard gate: exits non-zero when any known vulnerability is reachable
        # from this module's code (symbol-level analysis, not just go.sum).
        # @latest keeps the scanner current against the vuln DB schema.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  gosec:
    name: gosec (static security analysis)
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gosec
        # Hard gate: gosec exits non-zero on any finding at medium+ severity.
        # G304 (file inclusion via variable) is excluded wholesale: every hit
        # is an operator-supplied CLI flag path (--from report files, --state
        # tfstate, benchmark/standard files) — reading files the operator
        # names is this CLI's contract, not taint. Everything else either got
        # fixed (G301/G306 permissions) or carries an inline, justified
        # `#nosec` at the site (G101 finding-type labels, G204 fixed per-OS
        # report opener).
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
        with:
          args: -severity medium -exclude=G304 -fmt sarif -out gosec.sarif ./...

      - name: upload sarif
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
          category: gosec
