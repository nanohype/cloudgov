version: "2"

run:
  timeout: 5m

linters:
  settings:
    errcheck:
      # The fmt.Fprint* family (writes to stdout/stderr/tabwriter/strings.Builder)
      # and tabwriter.Flush never carry an actionable error in a CLI. Resource
      # handles (Close, etc.) are still checked explicitly at their call sites.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*text/tabwriter.Writer).Flush
